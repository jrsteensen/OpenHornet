name: Dispatch Docs Deployment

on:
  push:
    branches: [ master ]
    paths:
      - README.md
      - docs/**
      - images/**
      - .github/workflows/dispatch-docs-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch-docs-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Cloudflare docs deployment
        env:
          DOCS_DEPLOY_DISPATCH_TOKEN: ${{ secrets.DOCS_DEPLOY_DISPATCH_TOKEN }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [ -z "${DOCS_DEPLOY_DISPATCH_TOKEN}" ]; then
            echo "::warning::DOCS_DEPLOY_DISPATCH_TOKEN is not set; skipping Cloudflare docs dispatch."
            exit 0
          fi

          payload="$(jq -n \
            --arg repository "${SOURCE_REPOSITORY}" \
            --arg ref "${SOURCE_REF}" \
            --arg sha "${SOURCE_SHA}" \
            '{event_type:"docs-source-updated", client_payload:{repository:$repository, ref:$ref, sha:$sha, software_ref:"main", hardware_ref:"master"}}')"

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DOCS_DEPLOY_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jrsteensen/OpenHornet-Docs/dispatches \
            -d "${payload}"
